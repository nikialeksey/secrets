name: 'Setup Prerequisites'
description: 'Shared steps to prepare build environment'

runs:
  using: "composite"
  steps:
    - name: 'Setup JDK 21'
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'jetbrains'
        cache: 'gradle'

    - name: 'Setup Gradle'
      uses: gradle/actions/setup-gradle@v5
